const L=['A','B','C','D'];
const CH_TITLES={4:'Chapter 4 — The Healthy Professional',5:'Chapter 5 — Infection Control',6:'Chapter 6 — Chemistry & Chemical Safety',7:'Chapter 7 — Electricity & Electrical Safety'};
let currentFilter='all', activeQ=[], answered=0, correct=0;

function getQ(f){return f==='all'?[...Q]:Q.filter(q=>q.ch===f);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function filterChapter(ch,btn){
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=ch;
  build(getQ(ch),false);
}
function randomizeQuestions(){build(shuffle(getQ(currentFilter)),true);}

function build(questions,rand){
  activeQ=questions; answered=0; correct=0; updateProgress();
  const c=document.getElementById('quizContainer');
  document.getElementById('summary').style.display='none';
  c.innerHTML='';
  let lastCh=null;
  questions.forEach((q,i)=>{
    if(!rand && q.ch!==lastCh){
      lastCh=q.ch;
      const d=document.createElement('div');
      d.className='chapter-divider';
      d.innerHTML=`<h2>${CH_TITLES[q.ch]}</h2>`;
      c.appendChild(d);
    }
    const opts=rand?shuffle(q.o.map((t,j)=>({t,j}))):q.o.map((t,j)=>({t,j}));
    const card=document.createElement('div');
    card.className='q-card';
    card.innerHTML=`
      <div class="q-header">
        <span class="q-num">Q${i+1}${rand?'':' · Ch'+q.ch}</span>
        <span class="q-text">${q.q}</span>
      </div>
      <div class="options">
        ${opts.map((o,k)=>`
          <div class="option" data-orig="${o.j}" data-ans="${q.a}" data-qi="${i}" onclick="pick(this)">
            <span class="opt-letter">${L[k]}</span>
            <span>${o.t}</span>
          </div>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>`;
    c.appendChild(card);
  });
}

function pick(el){
  const p=el.parentElement;
  if(p.dataset.done==='1')return;
  p.dataset.done='1';
  const orig=+el.dataset.orig, ans=+el.dataset.ans, qi=+el.dataset.qi;
  const fb=document.getElementById('fb-'+qi);
  answered++;
  if(orig===ans){
    correct++;
    el.classList.add('correct');
    fb.textContent='✓ Correct!';
    fb.className='feedback correct';
  } else {
    el.classList.add('wrong');
    p.querySelectorAll('.option').forEach(o=>{if(+o.dataset.orig===ans)o.classList.add('show-correct');});
    fb.textContent='✗ Incorrect — correct answer highlighted in green.';
    fb.className='feedback wrong';
  }
  p.querySelectorAll('.option').forEach(o=>o.classList.add('answered'));
  updateProgress();
  if(answered===activeQ.length)setTimeout(showSummary,700);
}

function updateProgress(){
  const t=activeQ.length, pct=t?Math.round(answered/t*100):0;
  const s=answered?Math.round(correct/answered*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=answered+' / '+t+' answered';
  document.getElementById('scoreBadge').textContent='Score: '+s+'%';
}

function showSummary(){
  const pct=Math.round(correct/activeQ.length*100);
  document.getElementById('finalScore').textContent=pct+'%';
  const msg=pct>=90?'Outstanding! You are exam ready.':pct>=75?'Great work! Review the ones you missed.':pct>=60?'Good effort — a bit more review will get you there.':'Keep studying — you\'ve got this!';
  document.getElementById('finalText').textContent='You got '+correct+' out of '+activeQ.length+' correct. '+msg;
  document.getElementById('summary').style.display='block';
  document.getElementById('summary').scrollIntoView({behavior:'smooth'});
}

function restart(){
  document.getElementById('summary').style.display='none';
  build(getQ(currentFilter),false);
  window.scrollTo({top:0,behavior:'smooth'});
}

build(Q,false);
</script>
