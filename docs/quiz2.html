    color: var(--deep);

    border-radius: 12px;

    background: var(--red-light);
    border-color: var(--red);
  }

    border-color: var(--green);

    font-size: 0.9rem;
    font-weight: 500;

const LETTERS = ['A','B','C','D'];
let order = [];
let current = 0;
let answered = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;
let results = {};
let shuffle = false;
let wrongList = [];
let reviewMode = false;

function initOrder() {
  order = ALL_QUESTIONS.map((_, i) => i);
  if (shuffle) order = order.sort(() => Math.random() - 0.5);
}

function startQuiz() {
  current = 0; answered = 0; correct = 0; wrong = 0; skipped = 0;
  results = {}; wrongList = []; reviewMode = false;
  initOrder();
  document.getElementById('summary').classList.remove('show');
  document.getElementById('quiz').style.display = '';
  renderQ();
}

function renderQ() {
  const total = order.length;
  const idx = order[current];
  const q = ALL_QUESTIONS[idx];

  document.getElementById('q-num').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('progress-fill').style.width = `${((current)/total)*100}%`;
  document.getElementById('question-text').textContent = q.q;

  const cDiv = document.getElementById('choices');
  cDiv.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="letter">${LETTERS[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    if (results[idx] !== undefined) {
      btn.classList.add('disabled');
      if (i === q.answer) btn.classList.add(results[idx] === q.answer ? 'correct' : 'reveal-correct');
      if (i === results[idx] && results[idx] !== q.answer) btn.classList.add('wrong');
    }
    cDiv.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  if (results[idx] !== undefined) {
    if (results[idx] === q.answer) {
      fb.className = 'feedback correct-fb show';
      fb.textContent = '✓ Correct!';
    } else {
      fb.className = 'feedback wrong-fb show';
      fb.textContent = `✗ Incorrect. The correct answer is: ${q.choices[q.answer]}`;
    }
  }

  document.getElementById('next-btn').textContent = current === total - 1 ? 'Finish' : 'Next →';
  updateHeader();
}

function selectAnswer(i) {
  const idx = order[current];
  if (results[idx] !== undefined) return;
  const q = ALL_QUESTIONS[idx];
  results[idx] = i;
  answered++;

  const choices = document.querySelectorAll('.choice');
  choices.forEach(c => c.classList.add('disabled'));

  const fb = document.getElementById('feedback');
  if (i === q.answer) {
    correct++;
    choices[i].classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.textContent = '✓ Correct!';
  } else {
    wrong++;
    wrongList.push(idx);
    choices[i].classList.add('wrong');
    choices[q.answer].classList.add('reveal-correct');
    fb.className = 'feedback wrong-fb show';
    fb.textContent = `✗ Incorrect. The correct answer is: ${q.choices[q.answer]}`;
  }
  updateHeader();
}

function nextQ() {
  if (current === order.length - 1) {
    showSummary(); return;
  }
  current++;
  renderQ();
}

function prevQ() {
  if (current > 0) { current--; renderQ(); }
}

function skipQ() {
  const idx = order[current];
  if (results[idx] === undefined) skipped++;
  if (current < order.length - 1) { current++; renderQ(); }
  else showSummary();
}

function jumpTo(val) {
  const n = parseInt(val);
  if (!isNaN(n) && n >= 1 && n <= order.length) {
    current = n - 1;
    renderQ();
    document.getElementById('jump-input').value = '';
  }
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffle-toggle').classList.toggle('on', shuffle);
}

function updateHeader() {
  document.getElementById('hdr-correct').textContent = correct;
  document.getElementById('hdr-wrong').textContent = wrong;
}

function showSummary() {
  document.getElementById('quiz').style.display = 'none';
  const total = answered;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  document.getElementById('pct-score').innerHTML = `${pct}<span>%</span>`;
  document.getElementById('sum-correct').textContent = `✓ ${correct} correct`;
  document.getElementById('sum-wrong').textContent = `✗ ${wrong} wrong`;
  document.getElementById('sum-skip').textContent = `→ ${skipped} skipped`;
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('summary').classList.add('show');
}

function restartQuiz() {
  startQuiz();
}

function reviewWrong() {
  if (wrongList.length === 0) return;
  order = [...wrongList];
  current = 0; answered = 0; correct = 0; wrong = 0; skipped = 0;
  results = {}; wrongList = []; reviewMode = true;
  document.getElementById('summary').classList.remove('show');
  document.getElementById('quiz').style.display = '';
  renderQ();
}

startQuiz();
</script>
